name: Sync to Gitee

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Gitee
        run: |
          git remote add gitee https://aisayba:${{ secrets.GITEE_TOKEN }}@gitee.com/aisayba/sayba-platform-mcp-server.git
          git push gitee main --force
